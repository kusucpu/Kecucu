<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kucup chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>💬 Kucup chat</h1>
    <p class="subtitle">Enjoy!</p>
    
    <div class="chat-container" id="chatContainer">
      <div class="message bot-message">
        <div class="avatar">🤖</div>
        <div class="message-content">Hi! sup?</div>
      </div>
    </div>
    
    <div class="input-container">
      <select id="modelSelect" class="model-select">
        <option value="qwen/qwen-2.5-7b-instruct:free">Qwen 2.5 7B</option>
        <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B</option>
        <option value="google/gemma-2-9b:free">Gemma 2 9B</option>
        <option value="mistralai/mistral-7b-instruct:free">Mistral 7B</option>
        <option value="qwen/qwen-2.5-3b-instruct:free">Qwen 2.5 3B</option>
        <option value="meta-llama/llama-3.2-3b-instruct:free">Llama 3.2 3B</option>
      </select>
      <textarea 
        id="messageInput" 
        placeholder="Just do it..." 
        rows="2"
      ></textarea>
      <button id="sendButton" class="send-button">
        <span>Send</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
